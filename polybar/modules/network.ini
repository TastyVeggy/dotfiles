[module/network]
type = internal/network
interface-type = wired
interval = 3.0
accumulate-stats = true
unknown-as-up = true
speed-unit = B/s

format-connected = <label-connected>
format-connected-prefix = "󰤨  "
format-connected-prefix-background = ${colors.container-bg}
format-connected-prefix-foreground = ${colors.blue}

format-disconnected = <label-disconnected>
format-disconnected-prefix = "󰤮  "
format-disconnected-prefix-background = ${colors.container-bg}
format-disconnected-prefix-foreground = ${colors.red}

label-connected = %netspeed%
label-connected-background = ${colors.container-bg}
label-connected-foreground = ${colors.fg}

label-disconnected = "Offline"
label-disconnected-background = ${colors.container-bg}
label-disconnected-foreground = ${colors.fg}

