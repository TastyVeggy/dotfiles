[module/date]
type = internal/date
interval = 5
label-background = ${colors.container-bg}
label-foreground = ${colors.fg}
time = %d-%m-%Y
label = %time%

[module/time]
type = internal/date
interval = 1
format-prefix = "󰔠 "
format-prefix-background = ${colors.container-bg}
format-prefix-foreground = ${colors.purple}
label-background = ${colors.container-bg}
label-foreground = ${colors.fg}
time = %H:%M 
label = %time%


