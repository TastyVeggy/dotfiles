[module/battery]
type = internal/battery
full-at = 99
low-at = 10
battery = BAT1
adapter = ACAD

poll-interval = 2
time-format = %H:%M

format-charging = <animation-charging><label-charging>
label-charging = %percentage%%
label-charging-background = ${colors.container-bg}
label-charging-foreground = ${colors.fg}

animation-charging-background = ${colors.container-bg}
animation-charging-foreground = ${colors.red}
animation-charging-0 = "󰢟 "
animation-charging-1 = "󰂆 "
animation-charging-2 = "󰂇 "
animation-charging-3 = "󰢝 "
animation-charging-4 = "󰂉 "
animation-charging-5 = "󰂊 "
animation-charging-6 = "󰂅 "
animation-charging-framerate = 750

format-discharging = <ramp-capacity><label-discharging>
format-discharging-background = ${colors.container-bg}
format-discharging-foreground = ${colors.purple}
label-discharging = ${self.label-charging}
label-discharging-background = ${colors.container-bg}
label-discharging-foreground = ${colors.fg}

ramp-capacity-0 = "󰂎 "
ramp-capacity-1 = "󰁺 "
ramp-capacity-2 = "󰁻 "
ramp-capacity-3 = "󰁼 "
ramp-capacity-4 = "󰁽 "
ramp-capacity-5 = "󰁾 "
ramp-capacity-6 = "󰁿 "
ramp-capacity-7 = "󰂀 "
ramp-capacity-8 = "󰂁 "
ramp-capacity-9 = "󰂂 "

format-full-prefix-background = ${colors.container-bg}
format-full-prefix-foreground = ${colors.purple}
format-full-prefix = "󰁹 "
label-full = ${self.label-charging}
label-full-background = ${colors.container-bg}
label-full-foreground = ${colors.fg}
format-full = <label-full>

