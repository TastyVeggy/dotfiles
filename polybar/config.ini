[global/wm]
margin-top=0
margin-bottom=0
include-file = $HOME/.config/polybar/colors.ini
include-file = $HOME/.config/polybar/modules/time.ini
include-file = $HOME/.config/polybar/modules/container.ini
include-file = $HOME/.config/polybar/modules/network.ini
include-file = $HOME/.config/polybar/modules/audio.ini
include-file = $HOME/.config/polybar/modules/battery.ini
include-file = $HOME/.config/polybar/modules/workspaces.ini

; can in future try to somehow sed the monitor here
[bar/primary-top]
monitor = DP-0
monitor-exact = true
overide-redirect = false
enable-ipc = true
bottom = false
fixed-center = true

width = 100%
height = 2%
offset-x = 0%
offset-y = 2%

background = ${colors.bg}
foreground = ${colors.fg}

; padding essentially
border-size = 0.5%
border-color = ${colors.bg}

; need scale this manually based on monitor resolution
font-0 = JetBrainsMono Nerd Font:size=14;4 
font-1 = JetBrainsMono Nerd Font:size=20;6 
; for round edge

modules-left =  left pulseaudio space  workspaces right
modules-right = left network space time space date right
wm-restock = i3

[settings]
screenschange-reload = true
pseudo-transparency = true


